name: iOS Build Check

on:
  push:
    branches: [ main, master ] # Se ejecuta cuando subas cambios a estas ramas
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest # Aquí es donde ocurre la magia: un Mac real de GitHub
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build iOS App (Framework)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64