name: Deploy Web PWA

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Web (JS)
        # Este comando genera los archivos listos para la web
        run: ./gradlew :composeApp:jsBrowserDistribution

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa-files
          # Esta es la ruta donde Gradle guarda los archivos listos
          path: composeApp/build/dist/js/productionExecutable/